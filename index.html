<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AreaIQ by Hart — Indiana Neighborhood Research</title>

  <!-- Mapbox GL JS (loaded from CDN) -->
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.5.2/mapbox-gl.css">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.2/mapbox-gl.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1>AreaIQ <span class="brand-by">by Hart</span></h1>
    <p class="tagline">Research Indiana neighborhoods before you buy</p>
  </header>

  <main>
    <section id="search-section">
      <label for="address-input">Enter an address to research:</label>
      <input
        type="text"
        id="address-input"
        placeholder="123 Main St, Noblesville, IN 46060"
        autocomplete="off"
      >
      <button id="search-button" type="button">Search</button>
    </section>

    <section id="results-section">
      <p class="placeholder">Results will appear here once you search.</p>
    </section>
  </main>

  <footer>
    <p>Created by Kelvin Hart, Fathom Realty (Noblesville, IN)</p>
  </footer>
<script type="module" src="js/app.js"></script>
</body>
</html>
